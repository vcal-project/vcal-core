[graph]
all-features = true

[advisories]
yanked = "deny"
ignore = [
    "RUSTSEC-2026-0097", # rand 0.8.x; accepted temporarily for v0.1.3
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"